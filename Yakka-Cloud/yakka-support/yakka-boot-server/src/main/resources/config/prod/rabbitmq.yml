# 相当于 rocketmq.yml
yakka:
  rabbitmq:
    # 若系统中有除了zipkin之外的地方使用了mq ，则一定不能设置成false
    enabled: false
    ip: 127.0.0.1
    port: 5672
    username: 'yakka'
    password: 'yakka'

spring:
  rabbitmq:
    enabled: ${yakka.rabbitmq.enabled}
    host: ${yakka.rabbitmq.ip}
    port: ${yakka.rabbitmq.port}
    username: ${yakka.rabbitmq.username}
    password: ${yakka.rabbitmq.password}
    listener:
      type: direct # simple direct